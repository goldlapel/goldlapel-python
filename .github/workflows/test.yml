name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configure Postgres (trust auth for proxy upstream)
        run: |
          docker exec ${{ job.services.postgres.id }} bash -c "sed -i 's/scram-sha-256/trust/g; s/md5/trust/g' /var/lib/postgresql/data/pg_hba.conf"
          docker restart ${{ job.services.postgres.id }}
          until PGPASSWORD=postgres pg_isready -h localhost -U postgres; do sleep 1; done

      - name: Download goldlapel binary
        # Source from the public goldlapel-go repo (which commits binaries for
        # the Go module proxy). Avoids needing a PAT to reach the private
        # goldlapel/goldlapel release assets. raw.githubusercontent.com serves
        # the file on main with no auth required.
        run: |
          curl -fSL -o /tmp/goldlapel-linux-x86_64 \
            https://raw.githubusercontent.com/goldlapel/goldlapel-go/main/bin/goldlapel-linux-x86_64
          chmod +x /tmp/goldlapel-linux-x86_64
          echo "GOLDLAPEL_BINARY=/tmp/goldlapel-linux-x86_64" >> $GITHUB_ENV

      - name: Install package (editable) with dev extras
        run: pip install -e ".[dev]"

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
          PGHOST: localhost
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: postgres
        run: pytest -v
