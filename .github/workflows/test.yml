name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Configure Postgres (trust auth for proxy upstream)
        run: |
          docker exec ${{ job.services.postgres.id }} bash -c "sed -i 's/scram-sha-256/trust/g; s/md5/trust/g' /var/lib/postgresql/data/pg_hba.conf"
          docker restart ${{ job.services.postgres.id }}
          until PGPASSWORD=postgres pg_isready -h localhost -U postgres; do sleep 1; done

      - name: Download goldlapel binary
        # Download the latest release asset from the private goldlapel/goldlapel
        # repo using the org-level RELEASE_TOKEN PAT (same token used by all
        # release-*.yml workflows). Org secret has visibility=ALL, so it
        # propagates to this public wrapper repo's workflow runs.
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          LATEST=$(gh release list --repo goldlapel/goldlapel --limit 1 --json tagName -q '.[0].tagName')
          gh release download "$LATEST" --repo goldlapel/goldlapel --pattern "goldlapel-linux-x86_64" --dir /tmp
          chmod +x /tmp/goldlapel-linux-x86_64
          echo "GOLDLAPEL_BINARY=/tmp/goldlapel-linux-x86_64" >> $GITHUB_ENV

      - name: Install package (editable) with dev extras
        run: pip install -e ".[dev]"

      - name: Run tests
        env:
          # Standardized integration-test gate — both must be set for
          # integration tests to run. See tests/_integration_gate.py.
          GOLDLAPEL_INTEGRATION: "1"
          GOLDLAPEL_TEST_UPSTREAM: postgresql://postgres:postgres@localhost:5432/postgres
          # DATABASE_URL is still used by the SQLAlchemy/Django plugin tests
          # (the plugins read DATABASE_URL as the app-level default).
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
          PGHOST: localhost
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: postgres
        run: ./scripts/test.sh -v
